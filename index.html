<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniket Mukherjee | Creative Operations & Studio Lead</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --accent: #00ff88;
            --text-main: #f5f5f5;
            --text-dim: #a0a0a0;
            --border: #2a2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        /* Layout */
        .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
        section { padding: 6rem 0; border-bottom: 1px solid var(--border); }

        /* Navigation */
        nav { padding: 2rem 0; display: flex; justify-content: space-between; align-items: center; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: var(--text-dim); text-decoration: none; margin-left: 1.5rem; transition: 0.3s; font-size: 0.95rem; }
        .nav-links a:hover { color: var(--accent); }

        /* Hero */
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1.1; margin: 1rem 0; font-weight: 600; }
        .hero p { font-size: 1.25rem; color: var(--text-dim); max-width: 600px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-top: 3rem; }
        .card { background: var(--surface); padding: 2rem; border: 1px solid var(--border); }
        .card h3 { margin-bottom: 1rem; color: var(--text-main); }
        .card p { color: var(--text-dim); font-size: 0.95rem; }

        /* Experience Timeline */
        .exp-item { margin-bottom: 3rem; position: relative; padding-left: 2rem; border-left: 1px solid var(--accent); }
        .exp-item h3 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .exp-item .meta { color: var(--text-dim); margin-bottom: 1rem; font-size: 0.9rem; }
        .exp-item ul { list-style: none; color: var(--text-dim); }
        .exp-item li { margin-bottom: 0.75rem; font-size: 0.95rem; }
        .exp-item li::before { content: "— "; color: var(--accent); }

        /* Footer */
        footer { padding: 4rem 0; text-align: center; color: var(--text-dim); font-size: 0.8rem; }

        /* =========================================
           MOBILE OPTIMIZATION (Screens under 768px)
           ========================================= */
        @media (max-width: 768px) { 
            .container { padding: 0 1.5rem; }
            section { padding: 4rem 0; }
            
            /* Stack navigation cleanly */
            nav { flex-direction: column; align-items: flex-start; gap: 1.25rem; padding: 1.5rem 0; }
            .nav-links { width: 100%; justify-content: flex-start; gap: 1.5rem; }
            .nav-links a { margin-left: 0; font-size: 0.9rem; }

            /* Adjust hero spacing and text for phones */
            .hero h1 { font-size: 2.25rem; margin: 0.75rem 0; }
            .hero p { font-size: 1.05rem; }

            /* Stack grid elements vertically */
            .grid { grid-template-columns: 1fr; gap: 1.5rem; margin-top: 2rem; }
            .card { padding: 1.5rem; }

            /* Tighten experience timeline */
            .exp-item { padding-left: 1.25rem; margin-bottom: 2.5rem; }
            .exp-item h3 { font-size: 1.25rem; }
            
            footer { padding: 3rem 0; }
        }
    </style>
</head>
<body>

<div class="container">

        </div>
    </nav>
